# Production compose — uses pre-built image from ghcr.io (no local build needed)
# For Synology Container Manager or any Docker host.
#
# Setup:
#   1. Fill in all CHANGE_ME values below
#   2. docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: retroman
      POSTGRES_USER: retroman
      POSTGRES_PASSWORD: CHANGE_ME
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retroman"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/derwohat/retroman:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://retroman:CHANGE_ME@db:5432/retroman
      # Full URL of the app, e.g. http://192.168.1.100 or https://retroman.example.com
      NEXTAUTH_URL: http://CHANGE_ME
      # Generate with: openssl rand -base64 32
      NEXTAUTH_SECRET: CHANGE_ME
      # Must be exactly 64 hex characters — generate with: openssl rand -hex 32
      ENCRYPTION_KEY: CHANGE_ME_64HEX
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "7007:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - app

volumes:
  postgres_data:
  uploads:
